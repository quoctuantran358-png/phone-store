<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Shop</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>PHONE SHOP</h1>
        <p>Chuyên điện thoại chính hãng</p>
    </header>

    <nav>
        <a href="#">Trang chủ</a>
        <a href="#">Sản phẩm</a>
        <a href="#">Liên hệ</a>
        <a href="#">Giỏ hàng (<span id="cart-count">0</span>)</a>
    </nav>

    <main>
        <h2>Danh sách sản phẩm</h2>

        <div class="products">

            <div class="card">
                <img src="images/iphone15.jpg" alt="iPhone 15">
                <h3>iPhone 15</h3>
                <p class="price">20.000.000 VNĐ</p>
                <button onclick="addToCart('iPhone 15')">
                    Thêm vào giỏ
                </button>
            </div>

            <div class="card">
                <img src="images/samsungs24.jpg" alt="Samsung S24">
                <h3>Samsung Galaxy S24</h3>
                <p class="price">18.500.000 VNĐ</p>
                <button onclick="addToCart('Samsung Galaxy S24')">
                    Thêm vào giỏ
                </button>
            </div>

            <div class="card">
                <img src="images/xiaomi14.jpg" alt="Xiaomi 14">
                <h3>Xiaomi 14</h3>
                <p class="price">15.000.000 VNĐ</p>
                <button onclick="addToCart('Xiaomi 14')">
                    Thêm vào giỏ
                </button>
            </div>

        </div>

        <section class="cart">
            <h2>Giỏ hàng</h2>

            <ul id="cart-items"></ul>

            <button onclick="clearCart()">
                Xóa giỏ hàng
            </button>
        </section>

    </main>

    <footer>
        <p>© 2026 Phone Shop</p>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
